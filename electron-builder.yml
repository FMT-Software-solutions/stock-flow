appId: com.fmtsoftware.stock-flow
productName: stock-flow
copyright: Copyright © 2025 FMT Software Solutions

artifactName: stock-flow-setup-${version}.${ext}
directories:
  output: release/build
files:
  - dist/**/*
  - electron-app/dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: release/assets
    to: assets
    filter:
      - '**/*'
  - from: 'config/config.json'
    to: 'config.json'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: release/assets/favicon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: stock-flow
  installerIcon: release/assets/favicon.ico
  uninstallerIcon: release/assets/favicon.ico
  installerHeaderIcon: release/assets/favicon.ico
  installerSidebar: release/assets/fmt-sidebar-banner.bmp
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: 'stock-flow'
  displayLanguageSelector: false
  installerLanguages:
    - en_US
  license: false
  warningsAsErrors: false
mac:
  target: dmg
  icon: release/assets/icon.png
  category: public.app-category.business
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Finance
  icon: release/assets/icons

appImage:
  artifactName: '${productName}-${version}.AppImage'

publish:
  provider: generic
  url: https://your-domain.com/releases/

forceCodeSigning: false
